version: 0
name: hyperclaw-max-default-pack
status: skeleton

required_agents:
  - id: main
    role: orchestrator
    workspace: workspace
  - id: codex
    role: coding_and_infra
    workspace: workspace-codex
  - id: pa
    role: secretary_front_door
    workspace: workspace-pa
  - id: hk
    role: housekeeping_ops
    workspace: workspace-hk

optional_agents:
  - id: finance
    role: finance_overlay
    workspace: workspace-finance
  - id: legal
    role: legal_overlay
    workspace: workspace-legal

pack_rules:
